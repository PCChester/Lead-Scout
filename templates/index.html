<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadScout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
  <style>
    .max-cards-group { display: flex; align-items: center; gap: 0.5rem; }
    .max-cards-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--color-muted, #888); white-space: nowrap; }
    .max-cards-btns { display: flex; gap: 0.25rem; }
    .btn-max-cards { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; padding: 0.35rem 0.65rem; border: 1px solid var(--color-border, #444); background: transparent; color: var(--color-muted, #888); border-radius: 4px; cursor: pointer; transition: all 0.15s ease; }
    .btn-max-cards:hover { border-color: #00e0a0; color: #00e0a0; }
    .btn-max-cards.active { border-color: #00e0a0; background: rgba(0, 224, 160, 0.12); color: #00e0a0; }
    .type-badge { background: rgba(255,255,255,0.07); color: #aaa; }
    .type-badge.competitor { background: rgba(255,180,0,0.15); color: #ffb400; }
    .type-badge.employer { background: rgba(100,180,255,0.15); color: #64b4ff; }
    .type-badge.client { background: rgba(0,224,160,0.12); color: #00e0a0; }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <p class="logo-text">LeadScout</p>
      <p class="logo-sub">AI adoption signal detector</p>
    </div>
  </header>

  <main>
    <section class="controls">
      <select id="industry">
        <option value="">All Industries</option>
        <option value="Healthcare">Healthcare</option>
        <option value="Fintech">Fintech</option>
        <option value="Finance & Banking">Finance &amp; Banking</option>
        <option value="Retail & E-commerce">Retail &amp; E-commerce</option>
        <option value="Manufacturing">Manufacturing</option>
        <option value="Education">Education</option>
        <option value="HR & People Ops">HR &amp; People Ops</option>
        <option value="Legal">Legal</option>
        <option value="Marketing & Media">Marketing &amp; Media</option>
        <option value="Logistics & Supply Chain">Logistics &amp; Supply Chain</option>
        <option value="Language & Communication Training">Language &amp; Communication Training</option>
        <option value="IT & AI Solutions">IT &amp; AI Solutions</option>
        <option value="Film & Production">Film &amp; Production</option>
      </select>

      <select id="region">
        <option value="">All Regions</option>
        <option value="EU Remote">EU Remote</option>
        <option value="US Remote">US Remote</option>
        <option value="Valencia (In-person)">Valencia (In-person)</option>
        <option value="Spain Remote">Spain Remote</option>
      </select>

      <div class="max-cards-group">
        <span class="max-cards-label">Max cards</span>
        <div class="max-cards-btns">
          <button class="btn-max-cards" data-value="3">3</button>
          <button class="btn-max-cards" data-value="5">5</button>
          <button class="btn-max-cards active" data-value="10">10</button>
          <button class="btn-max-cards" data-value="20">20</button>
        </div>
      </div>

      <button id="btn-scout">Scout</button>
    </section>

    <div id="status-bar" class="status-bar hidden">
      <span class="status-dot"></span>
      <span id="status-text"></span>
    </div>

    <div id="results-grid" class="results-grid"></div>

    <div id="empty-state" class="empty-state">
      <p>Select an industry and region, then click <strong>Scout</strong>.</p>
    </div>
  </main>

  <!-- ── Card template ─────────────────────────────────────────────── -->
  <template id="card-tpl">
    <article class="card">
      <div class="card-header">
        <div class="card-title">
          <h3 class="company-name"></h3>
          <a class="company-domain" href="#" target="_blank" rel="noopener noreferrer"></a>
        </div>
        <div class="card-badges">
          <span class="badge score-badge"></span>
          <span class="badge region-badge"></span>
          <span class="badge type-badge"></span>
        </div>
        <button class="btn-dismiss" aria-label="Dismiss lead">✕</button>
      </div>

      <p class="fit-reason"></p>

      <ul class="signals"></ul>

      <details class="lead-details">
        <summary>Contact &amp; draft email</summary>

        <div class="contact-block">
          <span class="contact-name"></span>
          <span class="contact-role"></span>
          <a class="contact-email" href="#"></a>
        </div>

        <div class="draft-block">
          <pre class="email-draft"></pre>
          <button class="btn-copy">Copy</button>
          <a class="btn-copy btn-open-email" href="#" hidden>Open email</a>
        </div>
      </details>
    </article>
  </template>

  <script src="/static/js/main.js"></script>
</body>
</html>
